<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BenchAtlas Taxonomy Review</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/favicon.svg">
  <style>
    :root{--ink:#17140f;--paper:#f4f0e6;--panel:#fffdf8;--muted:#746d61;--rule:#c9c0ae;--teal:#087f78;--teal-soft:#e6f3ef;--red:#be271b;--amber:#b86b09;--blue:#28568c;--shadow:0 12px 28px rgba(42,34,22,.08);--serif:Georgia,"Times New Roman",serif;--sans:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif;--mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;color:var(--ink);background-color:var(--paper);background-image:linear-gradient(rgba(43,37,29,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(43,37,29,.06) 1px,transparent 1px);background-size:38px 38px;font-family:var(--sans)}button,input,select,textarea{font:inherit;color:inherit}button,select,input,textarea{border:1px solid var(--rule);border-radius:5px;background:var(--panel)}button{cursor:pointer}.app{display:grid;grid-template-rows:76px minmax(0,1fr);height:100%}.topbar{display:grid;grid-template-columns:auto minmax(260px,1fr) auto;align-items:center;gap:22px;padding:12px 18px;color:#fff;background:var(--ink);border-bottom:4px solid var(--teal)}.brand{display:flex;align-items:center;gap:12px;min-width:280px}.brand img{width:42px;height:42px}.brand h1{margin:0;font:700 25px/1 var(--serif)}.brand p{margin:5px 0 0;color:#8ed3cb;font:700 10px/1 var(--mono);text-transform:uppercase}.toolbar{display:grid;grid-template-columns:minmax(240px,1fr) 150px 150px;gap:8px}.toolbar input,.toolbar select{width:100%;height:42px;padding:0 12px;border-color:#524c42;background:#26221c;color:#fff}.toolbar input::placeholder{color:#aaa297}.actions{display:flex;align-items:center;gap:7px}.actions button{height:42px;padding:0 13px;border-color:#5b554b;color:#fff;background:#26221c;font-weight:700}.actions .primary{border-color:#4da99f;background:var(--teal)}.workspace{display:grid;grid-template-columns:278px minmax(560px,1fr) 360px;min-height:0}.rail,.inspector{min-height:0;background:rgba(255,253,248,.94)}.rail{display:flex;flex-direction:column;border-right:1px solid var(--rule)}.inspector{border-left:1px solid var(--rule);overflow:auto}.summary{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--rule)}.summary div{padding:15px 12px;border-right:1px solid var(--rule)}.summary div:last-child{border:0}.summary b{display:block;font:700 22px/1 var(--serif)}.summary span{font:700 9px/1 var(--mono);color:var(--muted);text-transform:uppercase}.progress{height:5px;background:#ddd5c7}.progress span{display:block;height:100%;background:var(--teal);transition:width .25s}.domain-list{padding:10px;overflow:auto}.domain{margin-bottom:8px;border:1px solid transparent;border-radius:5px}.domain.active{border-color:var(--ink);background:#f0eadf}.domain.drop-target{outline:3px solid rgba(8,127,120,.25)}.domain-head{display:grid;grid-template-columns:12px 1fr auto;align-items:center;gap:9px;width:100%;padding:10px;border:0;background:transparent;text-align:left}.domain-head i{width:10px;height:10px;border-radius:50%;background:var(--domain-color)}.domain-head b{font:700 15px/1.15 var(--serif)}.domain-head em{font:700 10px/1 var(--mono);font-style:normal;color:var(--muted)}.subfields{padding:0 8px 8px 31px}.subfield-link{display:flex;justify-content:space-between;width:100%;padding:6px 7px;border:0;background:transparent;color:var(--muted);font-size:12px;text-align:left}.subfield-link:hover,.subfield-link.active{color:var(--teal);background:#fff}.board-shell{display:grid;grid-template-rows:56px minmax(0,1fr);min-width:0}.board-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--rule);background:rgba(255,253,248,.88)}.board-head h2{margin:0;font:700 25px/1 var(--serif)}.board-head p{margin:3px 0 0;color:var(--muted);font:700 10px/1 var(--mono)}.board-head .legend{display:flex;gap:12px;font:700 10px var(--mono);color:var(--muted)}.legend i{display:inline-block;width:8px;height:8px;margin-right:4px;border-radius:50%}.board{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(245px,1fr);gap:10px;padding:12px;overflow:auto}.column{display:grid;grid-template-rows:auto minmax(0,1fr);min-height:0;border:1px solid var(--rule);background:rgba(255,253,248,.72)}.column.drop-target{outline:3px solid rgba(8,127,120,.35);background:var(--teal-soft)}.column-head{padding:12px;border-bottom:1px solid var(--rule);background:#eee8dc}.column-head b{font:700 16px var(--serif)}.column-head span{float:right;font:700 10px var(--mono);color:var(--muted)}.cards{padding:8px;overflow:auto}.card{position:relative;margin-bottom:7px;padding:10px 10px 9px 13px;border:1px solid #bdb4a4;border-left:4px solid var(--domain-color);border-radius:5px;background:var(--panel);box-shadow:0 3px 8px rgba(38,31,21,.04);cursor:grab}.card:hover,.card.selected{border-color:var(--teal);box-shadow:0 0 0 2px rgba(8,127,120,.13)}.card.dragging{opacity:.38}.card.approved::after,.card.needs-review::after,.card.changed::after{position:absolute;right:8px;top:8px;width:8px;height:8px;border-radius:50%;content:""}.card.approved::after{background:var(--teal)}.card.needs-review::after{background:var(--amber)}.card.changed::after{background:var(--red)}.card h3{max-width:calc(100% - 18px);margin:0 0 6px;font:700 15px/1.15 var(--serif)}.card-meta{display:flex;flex-wrap:wrap;gap:4px 8px;color:var(--muted);font:10px/1.35 var(--mono)}.card-meta strong{color:var(--blue)}.empty{padding:28px 16px;color:var(--muted);font:13px var(--mono);text-align:center}.inspector-empty{display:grid;place-items:center;height:100%;padding:35px;color:var(--muted);font:13px/1.6 var(--mono);text-align:center}.inspector article{padding:20px}.eyebrow{margin:0 0 8px;color:var(--teal);font:700 10px var(--mono);text-transform:uppercase}.inspector h2{margin:0 0 8px;font:700 31px/1 var(--serif)}.inspector .variant-count{margin:0 0 20px;color:var(--muted);font:11px var(--mono)}.field{margin:13px 0}.field label{display:block;margin-bottom:5px;color:var(--muted);font:700 10px var(--mono);text-transform:uppercase}.field select,.field textarea{width:100%;padding:9px}.field textarea{min-height:74px;resize:vertical}.original{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:15px 0}.original div{padding:10px;border:1px solid var(--rule);background:#f1ece2}.original span{display:block;color:var(--muted);font:9px var(--mono);text-transform:uppercase}.original b{display:block;margin-top:4px;font:700 13px var(--serif)}.review-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.review-buttons button{padding:9px 5px;font-size:12px;font-weight:700}.review-buttons button.active[data-status="approved"]{color:#fff;border-color:var(--teal);background:var(--teal)}.review-buttons button.active[data-status="needs_review"]{color:#fff;border-color:var(--amber);background:var(--amber)}.review-buttons button.active[data-status="todo"]{color:#fff;border-color:var(--ink);background:var(--ink)}.apply{width:100%;margin-top:12px;padding:11px;color:#fff;border-color:var(--teal);background:var(--teal);font-weight:800}.variant-list{margin:18px -20px 0;border-top:1px solid var(--rule)}.variant-list h3{margin:0;padding:14px 20px 8px;font:700 16px var(--serif)}.variant{padding:9px 20px;border-top:1px solid #ded6c8}.variant b{display:block;font-size:12px}.variant code{display:block;margin-top:4px;overflow:hidden;color:var(--muted);font:9px var(--mono);text-overflow:ellipsis;white-space:nowrap}.toast{position:fixed;left:50%;bottom:24px;z-index:30;transform:translateX(-50%) translateY(20px);padding:11px 16px;color:#fff;border-radius:4px;background:var(--ink);opacity:0;pointer-events:none;transition:.2s}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.file-input{display:none}@media(max-width:1200px){.workspace{grid-template-columns:240px minmax(520px,1fr) 320px}.topbar{grid-template-columns:auto 1fr}.actions{grid-column:1/-1}.app{grid-template-rows:118px minmax(0,1fr)}}
    .actions a{display:inline-grid;place-items:center;height:42px;padding:0 13px;border:1px solid #5b554b;border-radius:5px;color:#fff;background:#26221c;font-weight:700;text-decoration:none}.cross-domain-label{margin:16px 8px 7px;color:var(--red);font:800 9px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}.domain.cross-domain{border-top:2px solid var(--red)}.safety-column{border-top:3px solid var(--red)}.safety-column.drop-target{outline-color:rgba(190,39,27,.35);background:#f9e9e5}.purpose-field{margin-top:22px;padding-top:17px;border-top:1px solid var(--rule)}.safety-apply{border-color:var(--red);background:var(--red)}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><img src="/logo.svg" alt=""><div><h1>BenchAtlas</h1><p>Taxonomy Review Workbench</p></div></div>
      <div class="toolbar"><input id="search" type="search" placeholder="搜索 Benchmark / metric / 分组"><select id="statusFilter"><option value="all">全部审核状态</option><option value="todo">待审核</option><option value="approved">已确认</option><option value="needs_review">需讨论</option><option value="changed">已调整</option></select><select id="sourceFilter"><option value="all">全部分类来源</option><option value="benchmark_override">人工覆盖</option><option value="source_domain+keyword">来源 + 关键词</option><option value="source_domain+default">来源 + 默认</option></select></div>
      <div class="actions"><button id="undo" title="撤销上一步">撤销</button><button id="reset" title="清除本地修改">重置</button><button id="importButton">导入 Patch</button><a class="primary" id="exportButton" href="#" download>导出 Patch</a><input class="file-input" id="importFile" type="file" accept="application/json"></div>
    </header>
    <main class="workspace">
      <aside class="rail"><div class="summary"><div><b id="benchmarkCount">—</b><span>Benchmark</span></div><div><b id="groupCount">—</b><span>Rank groups</span></div><div><b id="reviewedCount">0</b><span>Reviewed</span></div></div><div class="progress"><span id="progressBar"></span></div><nav class="domain-list" id="domainList"></nav></aside>
      <section class="board-shell"><header class="board-head"><div><h2 id="boardTitle">Taxonomy</h2><p id="boardMeta">LOADING CATALOG</p></div><div class="legend"><span><i style="background:var(--teal)"></i>已确认</span><span><i style="background:var(--amber)"></i>需讨论</span><span><i style="background:var(--red)"></i>已调整</span></div></header><div class="board" id="board"></div></section>
      <aside class="inspector" id="inspector"><div class="inspector-empty">选择一个 Benchmark 查看分类依据<br>也可以直接拖动卡片调整分组</div></aside>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="/site_data.index.bundle.js?v=taxonomy-3"></script>
  <script src="/taxonomy-review/review.js?v=review-5"></script>
</body>
</html>
