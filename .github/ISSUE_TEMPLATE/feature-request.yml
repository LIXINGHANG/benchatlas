name: Feature request
description: Suggest an improvement to the explorer, data workflow, or ranking methodology.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research or comparison task is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
